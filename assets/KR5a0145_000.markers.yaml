  - {type: variant, offset: 3141, length: 0, content: '', CK-KZ: 讀周易參同契紫賢眞人辥道光註大丹妙用法乾坤乾坤運兮五行分五行順兮常道有生有死五行逆兮丹體常靈常存道光曰陽主生陰主死一生一死一去一來此常道順理之自然者也聖人則之反此陰陽逆施造化立乾坤爲鼎器盜先天一炁爲丹以丹煉形入於無形與道冥一道固無極仙豈有終一自虛無兆質兩儀因一開根四象不離二體八卦互爲祖孫萬象生乎變動吉凶悔吝茲分百姓日用不知聖人能究本源顧易道妙盡乾坤之理遂託象於斯文否泰交則陰陽或升或降屯蒙作則動靜在朝在昏坎離爲男女水火震兌乃龍虎魄魂守中則黃裳元吉遇亢則無位而尊旣未愼萬物之終始復姤昭二氣之歸奔月盈虧應精神之衰旺日出沒合榮衞之寒溫道光曰冬至之日地下有一陽之氣上升爲復卦人之元氣亦如之故進陽火至正月陰陽之氣相半自然相交爲泰卦人之元氣亦然故曰否泰交則陰陽或升或降也聖人移此一年氣候於一月三十日中以兩日半計三十辰以當一月故自月之一日以後太陽之光初萌爲復卦用事至上弦初八日月明一半金水平分爲泰卦用事至十六日以後月漸虧爲姤卦用事至下弦二十三日月虧一半金水平分爲否卦用事故曰月虧盈應精神之盛衰也又移此一月氣候歸一日十二辰中子時一陽生故人之腎中有一陽純精之氣上升進陽火爲復卦午時一陰生故人之心中有一陰至神之氣下降退陰符爲姤卦故曰復姤昭二氣之歸奔也夫子時起陽火子爲六陽之首故爲朝用屯卦直事午時起陰符午爲六陰之元故爲昏用蒙卦直事故曰屯蒙作則動靜在朝在昏也一日一夜兩卦直事三十日計六十卦屯蒙爲六十卦之始旣未爲六十卦之終終而復始始而復終故曰旣未愼萬物之始終也夫修金丹先以眞陰眞陽之物立爲爐鼎然後誘太極一炁爲丹太極之炁苟不以眞陰眞陽之物而誘之則不能降靈象是以參同契立乾坤二卦爲爐鼎分坎離爲藥物處於中宮其餘諸卦分在一月三十日内以運符火故乾坤者龍虎也震兌也夫婦也魂魄也坎離者鉛汞也水火也男女也情性也觸類而長之則不可勝紀矣原其至當而言之無過比喻眞陰眞陽之二物也以此二物合氣於中宮黃道之室而成丹故曰守中則黃裳元吉也旣得丹餌非眞火無以育其聖胎是以運元陽之氣爲火火無定位周流六虛故曰遇亢則無位而尊也夫日出爲晝日沒爲夜聖人運動符火於一日一夜之中分擘陰陽寒暑之氣外應天符内合榮衞消長一身抽添運用温養子珠故曰日出沒合榮衞之寒温也夫天一生水在人曰精地二生火在人曰神人之精神榮衞一身當與天地陰陽四時五行之氣運行不息也本立言以明象旣得象以忘言猶設象以指意悟其意則象捐達者惟𥳑惟易迷者愈惑愈繁故知修眞上士讀參同契不在乎泥象執文道光曰已上皆魏眞人以金丹之道至𥳑至易敷揚祕要故假易卦意寓於言俾學者悟其意以曉其言苟得金丹祕要則乾坤坎離震兌龍虎情性魂魄鉛汞水火之類皆可忘言矣苟明運火眞機則屯蒙旣未復姤否泰卦象爻銖皆可無用矣此仙翁恐學者讀參同契不曉眞人之意惟只泥象執文而不知捐象忘言之意故作此以示同徒其仁慈濟物如此雖然自非至人口訣亦未易以蹈其玄奧之萬一也贈白龍洞劉道人歌玉谿子李簡易註兔走鳥飛兩曜忙始聞花發又秋霜徒誇籛夀千餘𡻕也似雲中一電光一電光何太急百年三萬六千日其間寒暑互煎熬不覺紅顏暗中失縱有兒孫滿目前都成恩愛轉牽纏及乎精絕身枯朽誰解教君暫駐延旣無計不免將身隨逝水但看古往聖賢人幾箇解留身住世身住世也有方祇爲時人誤度量競向山中尋草木伏鉛制汞點丹陽點丹陽事逈別須向坎宮求赤血取歸離位制陰精坎坤體離乾體乾以陽交坤而成坎所謂流戊也坤以陰交乾而生離所謂就已也萬物姙娠於子乾坤壬癸會於北方故曰坎宮坎宮卽坤宮也西南是本鄉非未申之位也元氣從此而生赤血者卽是身中一點陽精又曰陽鉛實先天一炁耳經曰卓哉眞鉛天地之先是爲眞鉛也離位者卽乾宮是也知時採取此陽鉛以制離位之陰精陰精卽陰汞也木液也二物交結而成内丹卽非世間硃砂水銀五金八石草木有形之物匹配調和有時節藥味平平金水各半黃婆媒合婚冠相求貴在知其時節也時節正用媒人參同契曰晦至朔旦震來受符是一陽初動時也當斯之時牝龍吟雄虎嘯得媒人卽自交合媒人卽黃婆也古歌曰三四同居共一室一二夫妻爲偶匹要假良媒方得親遂使交遊情意密}
