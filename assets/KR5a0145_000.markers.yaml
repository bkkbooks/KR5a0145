  - {type: variant, offset: 3145, length: 0, content: '', CK-KZ: 云阿誰知運用大意要黃婆然則黃婆爲眞土眞土卽黃婆當雄雌交會之時剛柔相結而不可解非黃婆不能也實爲還丹之樞紐金水之隄防黃中通理正位居體美在其中而暢於四肢黃婆眞土已見其大槩矣金公姹女結親姻金公姹女見下文釋結親姻卽是投鉛合汞金公偏愛騎白虎金公鉛也抱天一之質本從月生而寄位於西方庚辛金而出於坎位故曰虎向水中生卽鉛中銀黑中白水中金也參同契曰金爲水母母隱子胎水者金子子藏母胞又曰被褐懷玉外爲狂夫乃眞鉛也實先天之一炁耳姹女常駕赤龍身姹女汞也汞負正陽之氣本從日生而寄質於東方甲乙木而出於離宮故曰龍從火裏出卽沙中汞雄裏雌太陽流珠也參同契曰汞日爲流珠靑龍與之俱又經曰赤髓流爲汞姹女弄明璫乃眞汞也木液是矣虎來靜坐秋江裏龍向碧潭奮起身秋江卽是西江碧潭卽是東海眞龍見眞虎則一起一伏兩相飲食俱相吞倂兩獸相逢戰一場波浪奔騰如鼎沸古歌曰靑龍逐虎虎尋龍赤禽交會聲嗈嗈是龍爭虎戰水激火發鼎沸暴湧顚倒受制時有嬰兒之聲黃婆丁老助威靈石眞人云黃婆雙乳美丁老片心慈龍虎相交戰東君總不知黃婆見前釋丁老乃文火也陰眞君曰我爲世上道無窮不知只伏嬰兒心眞漏泄天機也撼動乾坤走神鬼古歌曰聖人奪得造化意手摶日月安爐裏微微騰倒天地精攢簇陰陽走神鬼神鬼卽天魂地魄須臾戰罷雲氣收雲收雨散萬籟淨返掌中間災變福種箇玄珠在泥底復命篇曰夜來渾沌顚落地萬象森羅總不知乃一點落黃庭也黃庭卽中宮黃房也玄關也喻如泥底也紫陽曰一時辰内管丹成爲一日之丹就也日添一黍米大漸漸成玄珠也黃帝赤水求玄珠非罔象無由得之是此珠也罔象無思無慮也從此根芽漸長成時時灌漑抱眞精三谷子曰立基一百日温養以周星但當保精嗇神水自滋火自養待其氣足十月脫胎吞入腹忽覺凡軀已有靈紫陽又曰一粒靈丹吞入腹又曰脫胎又曰通神聖參同契曰金砂入五内霧散若風雨旣是内丹如何又曰入腹入口入五内後人疑此便爲外丹殊不知無質生質乃謂還丹眞一子所謂首採天地眞一混沌之炁而爲根基繼取乾坤精粹潛運之蹤而爲法象循坎離否泰之數而爲刑德盜陰陽變化之機而成冬夏陰生午後陽發子前故以乾坤爲鼎器以坎離爲藥物餘六十卦爲火候烹煉温養潛奪造化如果生枝上子在胞中十月火候氣足則倏爾而蛻神入眞胎與天相畢矣故云入口入腹入五内參同契曰類如雞子白黑相符縱廣一寸以爲始初四肢五臟筋骨乃俱彌厯十月脱出其胞可謂無質生質身外有身戀故軀則困在昏衢出泥丸則縱橫天地名題仙籍位號眞人乃大丈夫功成名遂之時也此箇事世間稀不是等閒人得知夙世若無仙骨分容易如何得遇之得遇之宜速煉都緣光景急如箭愛取魚兒須結莫使臨淵空歎羨聞君知藥已多年何不收心煉汞鉛莫教燭被風吹滅六道輪迴難怨天此語警劉仙且教其收心煉汞鉛以此見内丹須自己内煉非假外藥分曉近來世人多詭詐競著布衣稱道者問他金木是何般噤口無言似害啞金情因鉛而育木性因汞而凝鉛汞相投而情性自相戀也修丹不知此不可與語還丹矣卻云服氣與休糧別有門庭道理長君不見破迷歌裏說太乙含眞法最强旁門小法千條萬緖於金液還返内丹之道了無干涉所謂如何卻是道太乙含眞氣五星連珠日月合璧也内丹從此而結法身從此而出別無第二門也莫怪言辭甚乖劣只爲世人無鑒別惟君心與我心同方敢傾懷爲君說愚閱丹經}
