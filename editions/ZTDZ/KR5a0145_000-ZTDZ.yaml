front:
  text: 紫陽眞人悟眞篇拾遺律七
  hash: sha256:d3da0a99b10c7fafa27d55b0625f5ddcd8d8b138cef4dd7963edf31ac62e6c8f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0145_SJB_000-021030b, image: sjb/02/021030b.png}
body:
  text: 禪宗歌頌詩曲雜言此恐學道之人不通性理獨修金丹如此旣性命之道未修則運心不普物我離齊又焉能究竟圓通逈超三界故經云有十種仙皆於人中鍊心堅固精粹壽千萬歲若不修正覺三昧則報盡還來散入諸趣是以彌勒菩薩金剛經頌云饒君百萬劫終是落空亡故此悟眞篇者先以神仙命脉誘其修鍊次以諸佛妙用廣其神通終以眞如覺性遺其幻妄而歸於究竟空寂之本源矣性地頌六首佛性非同異千燈共一光增之寧解溢滅着且無傷取捨俱爲過焚漂總不妨見聞知覺法無一可猜量如何妙體遍河沙萬象森羅無障遮會得圓通眞法眼始知三界在吾家視之不可見其形及至呼時却又譍莫道此聲如谷響若還無谷有何聲一物含聞見覺知蓋諸塵境顯其機靈常一物尚非有四者憑何作所依不移一步到西天端坐諸方在目前項後有光猶是幻雲生足底未爲仙求仙本自無生畏滅何曾暫滅眼見不如耳見口說爭如鼻說無罪福終日行不曾行終日坐何曾坐修善不成功德造惡元無罪過時人若未明心莫執比言亂做死後須見閻王難免鑊湯碓磨三界唯心三界唯心妙理萬物非此非彼無一物非我心無一物是我己見物便見心見物便見心無物心不見十心通塞中眞心無不便若生知識解却成顛倒見睹境能無心始却菩薩面圓通見了眞空空不空圓明何處不圓通根塵心法都無物妙用方知與佛同隨他萬境縱横在目前隨他動靜任譁讙圓明定慧終無染似水生蓮蓮自乾寳月一輪寶月當虚空萬國清輝無障礙收之不聚撥不開前之不進後不退彼非遠兮此非近表非外兮裏非内同中有異異中同問你傀儡會不會心經頌藴締根塵空色都無一法堪言顛倒之見已盡寂靜之體修然人我又名齊物我不異人人心自異人有親疏我無彼此水陸飛行等觀一體貴賤尊卑首足同己我尚非有何嘗有你彼此俱無衆泡歸水讀雪竇禪師祖英集曹溪一滴分千派照古澄今無滯礙近來學者不窮源妄指蹄涔爲大海雪竇老師達眞趣大震雷音槌法鼓獅王哮吼出窟來百獸千邪皆恐懼或歌詩或語句叮嚀指引迷人路言詞磊落義高深擊玉敲金響千古争奈迷人逐境流却將言相尋名數眞如實相本無言無下無高無有邊非色非空非二體十方塵刹一輪圓正定何曾分語默取不得兮捨不得但於諸相不留心即是如來眞軌則爲除萬相將眞對妄若不生眞爾晦能到眞妄兩俱非方得眞心無罣礙無罣礙兮能自在一悟頓消窮劫罪不施功力證菩提從此永離生死海吾師道高言語暢留在世間爲榜様昨宵被我唤將來把鼻孔穿於杖上問他第一義如何却道有言皆是謗戒定慧解夫戒定慧者乃法中之妙用也佛祖雖嘗有言而未達者猶有所執今略而言之庶資開悟然其心境兩忘一念不動曰戒覺性圓明内外瑩徹曰定隨縁應物妙用無窮曰慧此三者相須而成互爲體用或戒之爲體者則定慧爲其用定爲體者則戒慧爲其用慧之爲體者則戒定爲其用三者未嘗斯須相離也猶如日假光而能照光假照而能明非光則不能照非照則不能明原其戒定慧者本乎一性光明照者本乎一日一尚非一三復何三三一俱忘湛然清淨即心是佛頌佛即心兮心即佛心佛從來皆妄物若知無佛亦無心始是眞如法身佛法身佛没模様一顆圓光含萬象無體之體即眞體無相之相即實相非色非空非不空不動不靜不來往無異無同無有無難取難捨難聽望内外圓明到處通一佛國在一沙中一粒沙含大千界一箇身心萬箇同知之須會法無心不染不滯爲淨業善惡千端無所爲便是南無及迦葉採珠歌寶子衣中珠本自圓明好不會自尋求却數他人寶數他寶終無益只是教君空費力争如認取自家珍價直黄金千萬億此寶珠光最大徧照三千大千界從來不解少分毫剛被浮雲爲障礙自從認得此摩尼泡體空花誰更愛佛珠還與我珠同我性即歸佛性海珠非珠海非海坦然心量包沙界任你塵囂滿眼前定慧圓明常自在不是空不是色内外皎然如壅塞六通神用妙無窮自利利他還解極見即了萬事畢絶學無爲度終日怕兮如未兆嬰兒動止隨縁無固必不斷妄不斷眞眞妄之心總屬塵從來萬法皆無相無相之中有法身法身即是天眞佛亦非人兮亦非物浩然充塞天地間只是希夷並恍惚垢不染光自明無法不從心裏生心若不生法自滅即知罪福本無形無佛修無法說丈夫智見自然别出言便作獅子鳴不似野牛論生滅禪定指迷歌如來禪性如水體靜風波自止興居湛湛常清不獨坐時方是今人靜坐取證不道全在見性性於見裏若明見向性中自定定成慧用無窮是名諸佛神通幾欲究其體用但見十方虚空空中杳無一物亦無希夷恍惚希恍旣不可尋尋之却成乖失只此乖失兩字不可執爲憑據本空尚乃如空豈有得失能所但將萬法遣除遣令淨盡無餘豁然圓明自現便與諸佛無殊色身爲我桎梏且恁和光混俗舉動一切無心争甚是非榮辱生身只是寄居逆旅主號毗盧毗盧不來不去乃知生滅無餘或問毗盧何以只爲有相不是眼前葉葉塵塵非同非異非親况此塵塵葉葉箇箇釋迦迦葉異則萬籟皆鳴同則一風都攝若要認得摩尼莫道得法方知有病用他藥療病痊藥更何施心迷須假法照心悟法更不要又如昏鏡得磨痕垢自然滅了本爲心法皆妄故令離盡諸相諸相離了如何是名至眞無上若欲莊嚴佛土平等行慈救苦菩提本願須深切莫相中有取此名福慧雙圓當來授記俱先倘若纖塵有染却於諸佛無縁翻念凡夫迷執盡被情愛染習只爲貪着情多常在胎卵化濕學道須教猛烈無情心剛似鐵直饒父母妻兒又與他人何别常守一顆圓光不見可欲思量萬法一時無着說甚地獄天堂然後我命在我空中無昇無墮出没諸佛土中不離菩提本坐觀音三十二應我學亦從中證化現不可思議盡出逍遥之性我是無心禪客凡事不會揀擇昔時一箇黑牛今日渾身總白有時自歌自笑傍人道我神少争知被褐之形内懷無價之寶更若見我談空却似囫圇吞棗此法惟佛能知凡愚豈解相表兼有修禪上賓只學鬥口合唇誇我問答敏給却元不識主人蓋是尋枝摘葉不解窮究本根得根枝葉自茂無根枝葉難存便逞已握靈珠轉於人我難除與他靈源妙覺遠隔千里之殊此輩可傷可笑空說積年學道心高不肯問人枉使一生虚老乃是愚迷鈍根邪見業重爲因若向此生不悟後世爭免沉淪無心頌堪笑我心如頑如鄙兀兀騰騰任物安委不解修行亦不造罪不曾利人亦不利己不持戒律不拘忌諱不知禮樂不行仁義人問所能百無一會飢來吃飯渴來飲水困則睡眠覺則行履熱則單衣寒則蓋被無思無慮何憂何喜不悔不謀無念無意死生榮辱逆旅而已林木栖鳥亦何爲比來且不禁去亦不止不避不來無讚無毁不厭醜惡不羡善美不處靜室不遠鬧市逢肉也餐遇酒也醉不說人非不誇己是不厚尊榮不薄賤稚親愛冤仇大小内外哀樂得喪敬侮儉易心無兩觀坦然一揆不爲福先不爲禍始感而後應迫而後起不畏鋒刃焉怕虎兕隨物稱呼豈拘名字眼不就色聲不來耳凡有所相皆屬妄僞男女形聲悉非定體體相無心不染不愛自在逍遥物莫能累妙覺光圓映徹表裏包裹六極無有遐邇光兮非光如月在水取捨旣難復何比擬了兹妙用迥然超彼或問所宗如斯而已西江月一十二首妄想不須强滅眞如何必希求本源自性佛齊修迷悟豈拘先後悟則刹那成佛迷則萬劫淪流若能一念契眞修滅盡恒沙罪垢本自無生無滅强將生滅區分只如罪福亦何根妙體何曾增損我有一輪明鏡從來只爲蒙昏今朝磨瑩照乾坤萬象超然難隱我性入諸佛性諸方佛性皆然亭亭蟾影照寒泉一月千潭普現小則毫分莫識大時遍滿三千高低不約信方圓說甚短長深淺法法法元無法空空空亦非空靜諠語默本來同夢裏何曾說夢有用用中無用無功功裏施功還如果熟自然紅莫問如何修種善惡一時妄念榮枯都不關心晦明隱顯任浮沉隨分飢餐渴飲神靜湛然常寂不妨坐卧歌吟一池秋水碧仍深風動魚驚儘任對鏡不須强滅假名權立菩提色空明暗本來齊眞妄體分兩體悟則便名淨土更無天笁曹溪誰言極樂在天西了則彌陀出世人我衆生壽者寧分彼此高低法身通照没吾伊念念體分同異見是何曾是是聞非未必非非往來諸用不相知生死誰能礙你住想修行布施果報不離天人恰如仰箭射浮雲墜落秪縁力盡爭似無爲實相還須返朴歸淳境忘情性任天眞以證無生法忍魚兔若還入手自然忘却筌蹄渡河筏子上天梯到彼悉皆遣弃未悟須憑言說悟來言說皆非雖然四句屬無爲此等何須脱離悟了莫求寂滅隨縁只接群迷尋常邪見及提携方便指歸實際五眼三身四智六度萬行修齊圓光一顆好摩尼利物兼能自利我見時人說性只誇口急酬機及逢境界轉癡迷又與愚人何異說得便須行得方名言行無虧能將慧劍斬魔魑此號如來正智欲了無生妙道莫如自見眞心眞心無相亦無音清淨法身只恁此道非無外有非中亦莫求尋二邊俱遣弃中心見了名爲上品紫陽眞人悟眞篇拾遺
